name: Test UI on Renovate PRs

on:
  workflow_dispatch:
    inputs:
      debug_shell:
        description: "Debug shell"
        required: true
        type: boolean
  pull_request:
    branches:
      - main
    paths:
      - "ui/**"
      - "build-images.sh"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # check-author: //// uncomment
  #   runs-on: ubuntu-latest
  #   outputs:
  #     is_renovate: ${{ steps.check.outputs.is_renovate }}
  #   steps:
  #     - id: check
  #       env:
  #         PR_AUTHOR: ${{ github.event.pull_request.user.login }}
  #       run: |
  #         # On workflow_dispatch, PR_AUTHOR is empty — allow the run.
  #         # On pull_request, only allow renovate[bot].
  #         if [[ -z "$PR_AUTHOR" || "$PR_AUTHOR" == "renovate[bot]" ]]; then
  #           echo "is_renovate=true" >> "$GITHUB_OUTPUT"
  #         else
  #           echo "is_renovate=false" >> "$GITHUB_OUTPUT"
  #         fi
  publish-images:
    # needs: check-author //// uncomment
    # if: needs.check-author.outputs.is_renovate == 'true' //// uncomment
    uses: NethServer/ns8-github-actions/.github/workflows/publish-branch.yml@v1
    permissions:
      packages: write
      actions: read
      contents: write

  module:
    needs: publish-images
    uses: NethServer/ns8-github-actions/.github/workflows/module-info.yml@v1

  run_ui_tests:
    needs: [module]
    uses: NethServer/ns8-github-actions/.github/workflows/test-on-digitalocean-infra.yml@v1
    with:
      script: test-ui.sh
      path: ui
      coremodules: ${{ format('ghcr.io/{0}/{1}:{2}', needs.module.outputs.owner, needs.module.outputs.name, needs.module.outputs.tag) }}
      leader_nodes: rl1
      args: ${{ format('ghcr.io/{0}/{1}:{2}', needs.module.outputs.owner, needs.module.outputs.name, needs.module.outputs.tag) }}
      repo_ref: ${{needs.module.outputs.sha}}
      debug_shell: ${{ github.event.inputs.debug_shell == 'true' || false }}
    secrets:
      do_token: ${{ secrets.do_token }}

  comment_screenshots:
    needs: [run_ui_tests]
    if: always() && needs.run_ui_tests.result != 'skipped' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test outputs
        id: download
        uses: actions/download-artifact@v4
        with:
          name: tests-logs-rl1
          path: tests-logs-rl1

      - name: Setup CML
        uses: iterative/setup-cml@v3

      - name: Post screenshots to PR
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          screenshots=(tests-logs-rl1/browser/screenshot/*.png)

          if [ ${#screenshots[@]} -eq 0 ]; then
            echo "No screenshots found, skipping comment."
            exit 0
          fi

          echo "## UI Test Screenshots" >> comment.md
          echo "" >> comment.md

          for img in "${screenshots[@]}"; do
            name=$(basename "$img" .png)
            echo "### ${name}" >> comment.md
            echo "" >> comment.md
            cml asset publish "$img" --md >> comment.md
            echo "" >> comment.md
          done

          cml comment update comment.md
